names:
  - hand
  - person

keypoints:
  - wrist              # 0: 手腕
  - thumb_cmc          # 1: 拇指根部 (掌指关节处)
  - thumb_mcp          # 2: 拇指掌指关节
  - thumb_ip           # 3: 拇指指间关节
  - thumb_tip          # 4: 拇指指尖
  - index_finger_mcp   # 5: 食指掌指关节 (指根)
  - index_finger_pip   # 6: 食指近端指间关节
  - index_finger_dip   # 7: 食指远端指间关节
  - index_finger_tip   # 8: 食指尖
  - middle_finger_mcp  # 9: 中指掌指关节
  - middle_finger_pip  # 10: 中指近端指间关节
  - middle_finger_dip  # 11: 中指远端指间关节
  - middle_finger_tip  # 12: 中指尖
  - ring_finger_mcp    # 13: 无名指掌指关节
  - ring_finger_pip    # 14: 无名指近端指间关节
  - ring_finger_dip    # 15: 无名指远端指间关节
  - ring_finger_tip    # 16: 无名指尖
  - pinky_mcp          # 17: 小指掌指关节
  - pinky_pip          # 18: 小指近端指间关节
  - pinky_dip          # 19: 小指远端指间关节
  - pinky_tip          # 20: 小指尖

skeleton:
  - - [0, 1]
    - [1, 2]
    - [2, 3]
    - [3, 4]

  - - [5, 6]
    - [6, 7]
    - [7, 8]

  - - [9, 10]
    - [10, 11]
    - [11, 12]

  - - [13, 14]
    - [14, 15]
    - [15, 16]

  - -  [17, 18]
    - [18, 19]
    - [19, 20]

  - - [0, 5]
    - [0, 17]
    - [5, 9]
    - [9, 13]
    - [13, 17]
